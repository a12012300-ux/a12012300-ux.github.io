name: 每日自動發文

on:
  schedule:
    # 每天台灣時間 09:00 執行（UTC 01:00）
    - cron: '0 1 * * *'
  # 允許手動從 GitHub 網頁觸發
  workflow_dispatch:
    inputs:
      articles_count:
        description: '今天要發幾篇文章（預設10篇）'
        required: false
        default: '10'

jobs:
  daily-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要 push 權限
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
    # ── 步驟1：取得最新程式碼 ──────────────────────────────
    - name: 📥 取得最新程式碼
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # ── 步驟2：設定 Python 環境 ───────────────────────────
    - name: 🐍 設定 Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # ── 步驟3：安裝套件 ────────────────────────────────────
    - name: 📦 安裝系統套件
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg fonts-noto-cjk

    - name: 📦 安裝 Python 套件
      run: pip install anthropic requests pillow numpy

    # ── 步驟3b：修復舊文章搜尋頁連結為直接商品頁 ─────────────
    - name: 🔗 修正商品連結（搜尋頁→直接商品頁）
      continue-on-error: true
      run: python pipeline/fix_affiliate_links.py

    # ── 步驟4：主管線（找商品→生文章→建站→推送）────────────
    - name: 🚀 執行主管線
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        ARTICLES_PER_DAY:  ${{ github.event.inputs.articles_count || '10' }}
        GIT_AUTHOR_NAME:   "毛孩研究室 Bot 🐾"
        GIT_AUTHOR_EMAIL:  "bot@maohao.tw"
        GIT_COMMITTER_NAME:  "毛孩研究室 Bot 🐾"
        GIT_COMMITTER_EMAIL: "bot@maohao.tw"
      run: |
        git config user.name  "毛孩研究室 Bot 🐾"
        git config user.email "bot@maohao.tw"
        python -m pipeline.run_pipeline \
          --n "${{ github.event.inputs.articles_count || '10' }}" \
          --no-email

    # ── 步驟5：生成 YouTube 影片（可選，失敗不影響整體）──────
    - name: 🎬 生成今日 YouTube 影片
      continue-on-error: true
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      run: python pipeline/video_maker.py

    - name: 📺 上傳影片到 YouTube
      continue-on-error: true
      env:
        YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      run: python pipeline/youtube_uploader.py

    # ── 步驟6：發布到社群媒體 ────────────────────────────
    - name: 📱 發布到 Threads + Instagram
      continue-on-error: true
      env:
        IG_USER_ID:           ${{ secrets.IG_USER_ID }}
        IG_ACCESS_TOKEN:      ${{ secrets.IG_ACCESS_TOKEN }}
        THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
        THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        SOCIAL_POSTS_PER_DAY: '3'
      run: python pipeline/social.py

    # ── 步驟7：寄 Email 通知（含今日社群貼文 + 圖文卡）─────
    - name: 📧 寄送 Email 通知
      if: always()
      env:
        GMAIL_USER:         ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python pipeline/notify.py

    # ── 步驟8：今日摘要 ──────────────────────────────────
    - name: 📊 今日摘要
      run: |
        echo "=================================================="
        echo "  毛孩研究室 每日自動化完成"
        echo "  日期：$(date '+%Y-%m-%d %H:%M UTC')"
        ARTICLE_COUNT=$(find posts -name "*.html" 2>/dev/null | wc -l | tr -d ' ')
        echo "  累積文章數：$ARTICLE_COUNT 篇"
        echo "=================================================="
