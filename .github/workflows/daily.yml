name: 每日自動發文

on:
  schedule:
    # 每天台灣時間 09:00 執行（UTC 01:00）
    - cron: '0 1 * * *'
  # 允許手動從 GitHub 網頁觸發
  workflow_dispatch:
    inputs:
      articles_count:
        description: '今天要發幾篇文章（預設5篇）'
        required: false
        default: '5'

jobs:
  daily-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要 push 權限

    steps:
    # ── 步驟1：取得最新程式碼 ──────────────────────────────
    - name: 📥 取得最新程式碼
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # ── 步驟2：設定 Python 環境 ───────────────────────────
    - name: 🐍 設定 Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # ── 步驟3：安裝套件 ────────────────────────────────────
    - name: 📦 安裝必要套件
      run: pip install anthropic requests

    # ── 步驟4：用 Claude AI 生成今日文章 ─────────────────────
    - name: ✍️ AI 生成今日評測文章
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        ARTICLES_PER_DAY: ${{ github.event.inputs.articles_count || '5' }}
      run: python pipeline/writer.py

    # ── 步驟5：建站（套用模板、更新首頁、更新 Sitemap）─────
    - name: 🏗️ 建站（套用模板 + 更新首頁）
      run: python build.py

    # ── 步驟6：提交並推送到 GitHub Pages ──────────────────
    - name: 🚀 推送到 GitHub Pages
      run: |
        git config user.name  "毛孩研究室 Bot 🐾"
        git config user.email "bot@maohao.tw"
        git add -A
        # 如果沒有變更就跳過 commit
        if git diff --staged --quiet; then
          echo "今天沒有新文章，跳過推送"
        else
          git commit -m "🤖 自動發文 $(date '+%Y-%m-%d') — $(git diff --staged --name-only | grep '\.html' | wc -l | tr -d ' ') 篇新文章"
          git push
          echo "✅ 推送成功！"
        fi

    # ── 步驟7：發布到 Threads + Instagram ─────────────────
    - name: 📱 發布到社群媒體
      env:
        IG_USER_ID:           ${{ secrets.IG_USER_ID }}
        IG_ACCESS_TOKEN:      ${{ secrets.IG_ACCESS_TOKEN }}
        THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
        THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        SOCIAL_POSTS_PER_DAY: '3'
      run: python pipeline/social.py

    # ── 步驟8：寄 Email 通知（含今日 IG 貼文內容）────────
    - name: 📧 寄送 Email 通知到手機
      if: always()
      env:
        GMAIL_USER:         ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        python - <<'PYEOF'
        import smtplib, os, json, glob
        from email.mime.text import MIMEText
        from email.mime.multipart import MIMEMultipart
        from datetime import datetime

        gmail_user = os.environ.get("GMAIL_USER", "")
        gmail_pass = os.environ.get("GMAIL_APP_PASSWORD", "")
        if not gmail_user or not gmail_pass:
            print("未設定 Gmail，跳過通知")
            exit(0)

        # 讀取今日文章
        files = sorted(glob.glob("pipeline/output/data/articles_summary_*.json"), reverse=True)
        articles = json.load(open(files[0], encoding="utf-8")) if files else []

        today = datetime.now().strftime("%Y-%m-%d")
        base_url = "https://a12012300-ux.github.io"

        # 組 IG 貼文內容
        ig_posts = ""
        for i, a in enumerate(articles[:3], 1):
            title   = a.get("title", "")
            keyword = a.get("keyword", "寵物")
            aff_url = a.get("affiliate_url", "")
            rating  = a.get("rating", "4.8")
            price   = a.get("price", "")
            price_text = f"NT${price} " if price else ""
            ig_posts += f"""
━━━━━━━━━━━━━━━━━━
【貼文 {i}】複製以下內容貼到 IG／Threads：
━━━━━━━━━━━━━━━━━━
🐾 {title}

剛實測了這款{price_text}{keyword}，評分 {rating}/5 ⭐

詳細評測 👉 {base_url}
蝦皮優惠 👉 {aff_url}

#毛孩研究室 #{keyword} #寵物推薦 #台灣寵物

"""

        body = f"""毛孩研究室 每日自動發文通知
日期：{today}
今日共發布 {len(articles)} 篇新文章

部落格連結：{base_url}

{'='*40}
📱 IG / Threads 貼文內容（直接複製貼上）
{'='*40}
{ig_posts}
"""

        msg = MIMEMultipart()
        msg["From"]    = gmail_user
        msg["To"]      = gmail_user
        msg["Subject"] = f"🐾 毛孩研究室 {today} 今日發文通知（{len(articles)}篇）"
        msg.attach(MIMEText(body, "plain", "utf-8"))

        try:
            with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                s.login(gmail_user, gmail_pass)
                s.send_message(msg)
            print(f"✅ Email 已寄送到 {gmail_user}")
        except Exception as e:
            print(f"[!] Email 寄送失敗：{e}")
        PYEOF

    # ── 步驟9：顯示今日摘要 ──────────────────────────────
    - name: 📊 今日摘要
      run: |
        echo "=================================================="
        echo "  毛孩研究室 每日自動化完成"
        echo "  日期：$(date '+%Y-%m-%d %H:%M UTC')"
        ARTICLE_COUNT=$(find posts -name "*.html" | wc -l | tr -d ' ')
        echo "  累積文章數：$ARTICLE_COUNT 篇"
        echo "=================================================="
