<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | 毛孩研究室</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:type" content="article">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#f8f9fa;color:#333;line-height:1.8}
header{background:#2d6a4f;color:white;padding:16px 0;text-align:center}
header a{color:white;text-decoration:none;font-size:1.1em;font-weight:bold}
.container{max-width:780px;margin:0 auto;padding:30px 20px}
.meta{color:#888;font-size:.85em;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #eee}
.meta span{margin-right:16px}
.tag{background:#d8f3dc;color:#1b4332;padding:3px 10px;border-radius:20px;font-size:.8em}
article h1{font-size:1.7em;line-height:1.4;margin-bottom:12px;color:#1b4332}
article h2{font-size:1.2em;color:#2d6a4f;margin:28px 0 12px;padding-left:10px;border-left:4px solid #52b788}
article h3{font-size:1.05em;margin:20px 0 8px;color:#444}
article p{margin-bottom:16px;color:#444}
article ul,article ol{margin:12px 0 16px 24px}
article li{margin-bottom:6px;color:#444}
.cta-box{background:linear-gradient(135deg,#d8f3dc,#b7e4c7);border-radius:12px;padding:20px 24px;margin:28px 0;text-align:center}
.cta-box p{margin-bottom:12px;font-weight:500;color:#1b4332}
.cta-btn{display:inline-block;background:#2d6a4f;color:white;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:1em;font-weight:bold}
.cta-btn:hover{background:#1b4332}
.rating{background:#fff8e1;border-radius:8px;padding:16px 20px;margin:20px 0;border:1px solid #ffe082}
.rating-score{font-size:2em;color:#f59e0b;font-weight:bold}
.breadcrumb{font-size:.85em;color:#999;margin-bottom:20px}
.breadcrumb a{color:#2d6a4f;text-decoration:none}
footer{text-align:center;padding:30px;color:#999;font-size:.82em;margin-top:40px;border-top:1px solid #eee}
</style>
</head>
<body>
<header>
  <a href="../index.html">🐾 毛孩研究室</a>
</header>
<div class="container">
  <div class="breadcrumb">
    <a href="../index.html">首頁</a> › <span class="tag">{{KEYWORD}}</span>
  </div>
  <article>
    {{CONTENT}}
  </article>
  <div class="cta-box">
    <p>📦 想買這個商品？現在蝦皮有優惠價！</p>
    <a class="cta-btn" href="{{AFFILIATE_URL}}" target="_blank" rel="nofollow">👉 蝦皮查看最新價格</a>
  </div>
</div>
<footer>
  © 2026 毛孩研究室 · 本站含有聯盟行銷連結
</footer>
</body>
</html>
